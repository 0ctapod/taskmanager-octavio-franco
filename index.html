<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="taskManager">
        <h1>Task Manager</h1>

        <div class="formulario">
            <input type="text" id="inputTarea" placeholder="Escribe una tarea">

            <select id="categoriaTarea">
                <option value="">Selecciona una categoría</option>
                <option value="💼">💼 Trabajo</option>
                <option value="📚">📚 Estudio</option>
                <option value="🏠">🏠 Personal</option>
                <option value="🚨">🚨 Urgente</option>
                <option value="otra">Otra...</option>
            </select>

            <input type="text" id="inputOtraCategoria" placeholder="Escribe tu categoría" style="display: none;">

            <div id="mensajeError"></div>

            <button id="agregarTarea" onclick="agregarNuevaTarea()">Agregar tarea</button>
        </div>

        <p class="contador">
            <span id="tareasCompletadas">0</span> de
            <span id="tareasTotales">0</span> tareas completadas
        </p>

        <div id="listaTareas">
            <!-- AQUI SE AGREGAN LAS TAREAS -->
        </div>


        <button id="btnLimpiar">Limpiar completadas</button>
    </div>

    <script src="app.js"></script>
</body>

</html>
